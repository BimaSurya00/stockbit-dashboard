services:
  stockbit-backend:
    container_name: stockbit-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3028:3001'
    env_file:
      - .env
    restart: always
    networks:
      - stockbit_network
      - siwa_net

  stockbit-snapshot-worker:
    container_name: stockbit-snapshot-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: node workers/fetch-snapshots.js
    env_file:
      - .env
    restart: always
    depends_on:
      - stockbit-backend
    networks:
      - stockbit_network
      - siwa_net

  stockbit-price-worker:
    container_name: stockbit-price-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: node workers/fetch-daily-prices.js
    env_file:
      - .env
    restart: always
    depends_on:
      - stockbit-backend
    networks:
      - stockbit_network
      - siwa_net

networks:
  stockbit_network:
    name: stockbit_network
    driver: bridge
  siwa_net:
    external: true
    name: whatsmeow-api_siwa_net
