services:
  stockbit-backend:
    container_name: stockbit-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3028:3001'
    env_file:
      - .env
    restart: always
    networks:
      - stockbit_network
      - siwa_net

networks:
  stockbit_network:
    driver: bridge
  siwa_net:
    external: true
    name: whatsmeow-api_siwa_net
